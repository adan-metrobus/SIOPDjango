{% extends 'myapp/base.html' %}

{% block title %}Antigüedad de Folios Abiertos{% endblock %}

{% block content %}
    <h3 class="mt-4">Antigüedad de Folios con Estatus "Abierto"</h3>
    <p>Haz clic en una barra para ver el detalle de los folios.</p>
    <div id="grafica-status-abierto"></div>
    <hr>
    <div id="tabla-detalle-abiertos-container">
        <h4 id="titulo-tabla-detalle"></h4>
        <div id="tabla-detalle-abiertos"></div>
    </div>

    <script>
        var fig = {{ fig_json|safe }};
        var myPlot = document.getElementById('grafica-status-abierto');
        Plotly.newPlot(myPlot, fig.data, fig.layout);

        myPlot.on('plotly_click', function(data){
            var rango = data.points[0].x;
            var url = `{% url 'grafica_status_abierto' %}?rango_antiguedad=${encodeURIComponent(rango)}`;

            fetch(url)
                .then(response => response.text())
                .then(html => {
                    document.getElementById('tabla-detalle-abiertos').innerHTML = html;
                    document.getElementById('titulo-tabla-detalle').innerText = `Detalle para el rango: ${rango}`;
                });
        });
    </script>
{% endblock %}
